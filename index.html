<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gaze Pattern Shooter</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script>
// ============================================================
// RAYCASTER AUTO-REFRESH COMPONENT
// A-Frame caches raycaster object lists -- this component
// re-queries every 200ms so dynamically added .grid-ball
// spheres are always included.
// ============================================================
AFRAME.registerComponent("raycaster-auto-refresh", {
  schema: { interval: { default: 200 } },
  init() {
    this._elapsed = 0;
  },
  tick(t, dt) {
    this._elapsed += dt;
    if (this._elapsed < this.data.interval) return;
    this._elapsed = 0;
    const cursor = document.querySelector("#gazeCursor");
    if (cursor && cursor.components && cursor.components.raycaster) {
      cursor.components.raycaster.refreshObjects();
    }
  }
});

// ============================================================
// TEXTURE GENERATION via THREE.CanvasTexture
// Bypasses a-assets entirely -- generates canvases and stores
// THREE.Texture objects in a map, applied directly to meshes.
// ============================================================

// This map is populated once and reused everywhere.
const ballTextures = {};

const colorDefs = {
  red:    { base: "#cc2200", dot: "rgba(255,255,255,0.32)", r: 6,  sp: 22 },
  blue:   { base: "#1144cc", dot: "rgba(255,255,255,0.32)", r: 5,  sp: 20 },
  green:  { base: "#1a8c3a", dot: "rgba(255,255,255,0.30)", r: 6,  sp: 24 },
  purple: { base: "#6622bb", dot: "rgba(255,255,255,0.30)", r: 5,  sp: 20 },
  orange: { base: "#cc6600", dot: "rgba(255,255,255,0.32)", r: 7,  sp: 26 },
  pink:   { base: "#cc2277", dot: "rgba(255,255,255,0.32)", r: 5,  sp: 19 }
};

function buildCanvasTexture(def) {
  const SIZE = 128;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = SIZE;
  const ctx = canvas.getContext("2d");

  // Solid base color
  ctx.fillStyle = def.base;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Radial highlight/vignette
  const grad = ctx.createRadialGradient(SIZE*0.4, SIZE*0.35, SIZE*0.05, SIZE/2, SIZE/2, SIZE*0.72);
  grad.addColorStop(0, "rgba(255,255,255,0.20)");
  grad.addColorStop(1, "rgba(0,0,0,0.35)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Dot-grid overlay
  ctx.fillStyle = def.dot;
  const sp = def.sp, off = sp / 2;
  for (let y = off; y < SIZE; y += sp)
    for (let x = off; x < SIZE; x += sp) {
      ctx.beginPath();
      ctx.arc(x, y, def.r, 0, Math.PI * 2);
      ctx.fill();
    }

  return canvas;
}

// Build textures only after THREE is available (after a-frame loads)
document.addEventListener("DOMContentLoaded", () => {
  Object.entries(colorDefs).forEach(([name, def]) => {
    const canvas = buildCanvasTexture(def);
    // THREE is global after aframe.min.js loads
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    ballTextures[name] = tex;
  });
});
</script>

body { margin:0; }
#enterVRBtn {
  position: fixed;
  bottom: 18px;

<!-- ============================================================
     SCRIPT
============================================================ -->
<script>

//////////////////////////////
// PHASE MANAGEMENT
// Phases: "flash" → "setup" → "game"
//////////////////////////////

let currentPhase = "flash";

// Settings chosen in setup menu
const settings = {
  difficulty: "easy",   // "easy" | "hard"
  musicOn: true
};

// Difficulty configs
const difficultyConfig = {
  easy: { rows: 3, cols: 4, fuseTimeout: 2000 },
  hard: { rows: 4, cols: 6, fuseTimeout: 1200 }
};


//////////////////////////////
// ELEMENT REFS
//////////////////////////////

const flashscreen      = document.querySelector("#flashscreen");
const setupMenu        = document.querySelector("#setupMenu");
const gazeCursor       = document.querySelector("#gazeCursor");

const lifeText         = document.querySelector("#lifeText");
const scoreText        = document.querySelector("#scoreText");
const roundText        = document.querySelector("#roundText");
const timerText        = document.querySelector("#timerText");
const gameOverText     = document.querySelector("#gameOver");
const gameOverPanel    = document.querySelector("#gameOverPanel");
const targetBall       = document.querySelector("#targetBall");
const targetLabel      = document.querySelector("#targetLabel");

const diffIndicator    = document.querySelector("#difficultyIndicator");
const musicIndicator   = document.querySelector("#musicIndicator");


//////////////////////////////
// HELPERS
//////////////////////////////

// Make an element pulse (scale) on hover to signal it is interactive
function addHoverPulse(el) {
  el.addEventListener("mouseenter", () => {
    el.setAttribute("scale", "1.08 1.08 1.08");
  });
  el.addEventListener("mouseleave", () => {
    el.setAttribute("scale", "1 1 1");
  });
}

// Highlight the selected difficulty button
function refreshDifficultyUI() {
  const easyBg = document.querySelector("#easyBtnBg");
  const hardBg = document.querySelector("#hardBtnBg");
  const easyTxt = document.querySelector("#easyBtn");
  const hardTxt = document.querySelector("#hardBtn");

  if (settings.difficulty === "easy") {
    easyBg.setAttribute("color", "#005500");
    easyTxt.setAttribute("color", "#88ffaa");
    hardBg.setAttribute("color", "#330000");
    hardTxt.setAttribute("color", "#ff4444");
    diffIndicator.setAttribute("value", "Selected: EASY");
  } else {
    easyBg.setAttribute("color", "#003300");
    easyTxt.setAttribute("color", "#44ff88");
    hardBg.setAttribute("color", "#660000");
    hardTxt.setAttribute("color", "#ffaaaa");
    diffIndicator.setAttribute("value", "Selected: HARD");
  }
}

// Highlight the selected music button
function refreshMusicUI() {
  const onBg  = document.querySelector("#musicOnBtnBg");
  const offBg = document.querySelector("#musicOffBtnBg");
  const onTxt  = document.querySelector("#musicOnBtn");
  const offTxt = document.querySelector("#musicOffBtn");

  if (settings.musicOn) {
    onBg.setAttribute("color",  "#003344");
    onTxt.setAttribute("color", "#00e5ff");
    offBg.setAttribute("color", "#222222");
    offTxt.setAttribute("color","#555555");
    musicIndicator.setAttribute("value", "Selected: ON");
  } else {
    onBg.setAttribute("color",  "#001122");
    onTxt.setAttribute("color", "#335566");
    offBg.setAttribute("color", "#444444");
    offTxt.setAttribute("color","#dddddd");
    musicIndicator.setAttribute("value", "Selected: OFF");
  }
}


//////////////////////////////
// PHASE: FLASH → SETUP
//////////////////////////////

function dismissFlashscreen() {
  if (currentPhase !== "flash") return;
  currentPhase = "setup";

  flashscreen.setAttribute("visible", "false");
  setupMenu.setAttribute("visible", "true");

  // Initialize UI state
  refreshDifficultyUI();
  refreshMusicUI();
}


//////////////////////////////
// PHASE: SETUP → GAME
//////////////////////////////

function startGame() {
  if (currentPhase !== "setup") return;
  currentPhase = "game";

  unlockAudio(); // BEGIN button click = user gesture, unlock audio now

  setupMenu.setAttribute("visible", "false");

  // Apply chosen fuse-timeout
  const cfg = difficultyConfig[settings.difficulty];
  gazeCursor.setAttribute("fuse-timeout", cfg.fuseTimeout);

  // Show gameplay HUD
  lifeText.setAttribute("visible", "true");
  scoreText.setAttribute("visible", "true");
  roundText.setAttribute("visible", "true");
  timerText.setAttribute("visible", "true");
  targetBall.setAttribute("visible", "true");
  targetLabel.setAttribute("visible", "true");

  initGame();
}


//////////////////////////////
// FLASH SCREEN BUTTON
//////////////////////////////

// The start button sits inside the flashscreen entity which is camera-attached,
// so we attach events after the scene loads.
document.querySelector("a-scene").addEventListener("loaded", () => {

  const startBtn   = document.querySelector("#startBtn");
  const startBtnBg = document.querySelector("#startBtnBg");

  addHoverPulse(startBtnBg);

  startBtn.addEventListener("click", dismissFlashscreen);
  startBtnBg.addEventListener("click", dismissFlashscreen);
  startBtn.addEventListener("mouseenter", () => {
    startBtn.setAttribute("color", "#ffffff");
  });
  startBtn.addEventListener("mouseleave", () => {
    startBtn.setAttribute("color", "#00e5ff");
  });


  // ---- Setup menu buttons ----

  const easyBtn    = document.querySelector("#easyBtn");
  const easyBtnBg  = document.querySelector("#easyBtnBg");
  const hardBtn    = document.querySelector("#hardBtn");
  const hardBtnBg  = document.querySelector("#hardBtnBg");
  const musicOnBtn    = document.querySelector("#musicOnBtn");
  const musicOnBtnBg  = document.querySelector("#musicOnBtnBg");
  const musicOffBtn   = document.querySelector("#musicOffBtn");
  const musicOffBtnBg = document.querySelector("#musicOffBtnBg");
  const beginBtn   = document.querySelector("#beginBtn");
  const beginBtnBg = document.querySelector("#beginBtnBg");

  // Difficulty
  function selectEasy() {
    if (currentPhase !== "setup") return;
    settings.difficulty = "easy";
    refreshDifficultyUI();
  }
  function selectHard() {
    if (currentPhase !== "setup") return;
    settings.difficulty = "hard";
    refreshDifficultyUI();
  }

  easyBtn.addEventListener("click",   selectEasy);
  easyBtnBg.addEventListener("click", selectEasy);
  hardBtn.addEventListener("click",   selectHard);
  hardBtnBg.addEventListener("click", selectHard);

  addHoverPulse(easyBtnBg);
  addHoverPulse(hardBtnBg);

  // Music
  function selectMusicOn() {
    if (currentPhase !== "setup") return;
    settings.musicOn = true;
    refreshMusicUI();
  }
  function selectMusicOff() {
    if (currentPhase !== "setup") return;
    settings.musicOn = false;
    refreshMusicUI();
  }

  musicOnBtn.addEventListener("click",    selectMusicOn);
  musicOnBtnBg.addEventListener("click",  selectMusicOn);
  musicOffBtn.addEventListener("click",   selectMusicOff);
  musicOffBtnBg.addEventListener("click", selectMusicOff);

  addHoverPulse(musicOnBtnBg);
  addHoverPulse(musicOffBtnBg);

  // Begin
  beginBtn.addEventListener("click",   startGame);
  beginBtnBg.addEventListener("click", startGame);
  addHoverPulse(beginBtnBg);
  beginBtn.addEventListener("mouseenter", () => {
    beginBtn.setAttribute("color", "#ffffff");
  });
  beginBtn.addEventListener("mouseleave", () => {
    beginBtn.setAttribute("color", "#ffaa00");
  });

  // ---- Play Again button ----
  const playAgainBtn   = document.querySelector("#playAgainBtn");
  const playAgainBtnBg = document.querySelector("#playAgainBtnBg");

  function playAgain() {
    stopTimer();

    // Hide game over panel
    gameOverPanel.setAttribute("visible", false);

    // Clear the grid
    const grid = document.querySelector("#grid");
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    // Hide gameplay elements
    targetBall.setAttribute("visible", false);
    targetLabel.setAttribute("visible", false);
    lifeText.setAttribute("visible", false);
    scoreText.setAttribute("visible", false);
    roundText.setAttribute("visible", false);
    timerText.setAttribute("visible", false);

    // Reset fuse timeout to default
    gazeCursor.setAttribute("fuse-timeout", "2000");

    // Go back to setup menu
    currentPhase = "setup";
    setupMenu.setAttribute("visible", true);
    refreshDifficultyUI();
    refreshMusicUI();
  }

  playAgainBtn.addEventListener("click",   playAgain);
  playAgainBtnBg.addEventListener("click", playAgain);
  addHoverPulse(playAgainBtnBg);
  playAgainBtn.addEventListener("mouseenter", () => {
    playAgainBtn.setAttribute("color", "#ffffff");
  });
  playAgainBtn.addEventListener("mouseleave", () => {
    playAgainBtn.setAttribute("color", "#ff44ff");
  });

});


//////////////////////////////
// GAME STATE
//////////////////////////////

const TOTAL_ROUNDS   = 5;
const GAME_TIME      = 120; // seconds

// Level 1 uses 5 colors, Level 2 adds pink
const patternsL1 = ["red", "blue", "green", "purple", "orange"];
const patternsL2 = ["red", "blue", "green", "purple", "orange", "pink"];

const patternColor = {
  red:    "#cc2200",
  blue:   "#1144cc",
  green:  "#1a8c3a",
  purple: "#6622bb",
  orange: "#cc6600",
  pink:   "#cc2277"
};

let currentRound  = 1;  // 1-5
let currentLevel  = 1;  // 1 or 2 within each round
let activePatterns = patternsL1;

let lives         = 3;
let score         = 0;
let gameActive    = false;
let roundsCompleted = 0;

// Projectile travel duration (ms) -- fast, consistent across all levels
const projectileDur = 150;

// Timer
let timeLeft      = GAME_TIME;
let timerInterval = null;

function updateLives() {
  lifeText.setAttribute("value", "Lives: " + lives);
}

function updateScore() {
  scoreText.setAttribute("value", "Score: " + score);
}

function updateRound() {
  roundText.setAttribute("value", "Round: " + currentRound + "/" + TOTAL_ROUNDS);
}

function updateTimer() {
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, "0");
  timerText.setAttribute("color", timeLeft <= 15 ? "#ff2244" : "#ff8844");
  timerText.setAttribute("value", "Time: " + mins + ":" + secs);
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      stopTimer();
      timeOut();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function timeOut() {
  gameActive = false;
  showFinalScore("TIME'S UP!");
}

function showFinalScore(label) {
  stopTimer();
  const panel      = document.querySelector("#gameOverPanel");
  const labelEl    = document.querySelector("#gameOverLabel");
  const roundsEl   = document.querySelector("#gameOverRounds");
  const scoreEl    = document.querySelector("#gameOver");
  const accentTop  = panel.querySelector("a-plane:nth-child(2)");
  const accentBot  = panel.querySelector("a-plane:nth-child(3)");

  const isWin = label === "YOU WIN!";
  labelEl.setAttribute("value", label);
  labelEl.setAttribute("color", isWin ? "#44ff88" : "#ff2244");
  if (accentTop) accentTop.setAttribute("color", isWin ? "#44ff88" : "#ff2244");
  if (accentBot) accentBot.setAttribute("color", isWin ? "#44ff88" : "#ff2244");

  roundsEl.setAttribute("value", "Rounds: " + roundsCompleted + " / " + TOTAL_ROUNDS);
  scoreEl.setAttribute("value",  "Score: " + score);

  const cam = document.querySelector("#cameraRig");
  panel.setAttribute("position", cam.getAttribute("position"));
  panel.setAttribute("visible", true);
}

function endGame() {
  gameActive = false;
  stopMusic();
  showFinalScore("GAME OVER");
}


//////////////////////////////
// AUDIO HELPERS
//////////////////////////////

const hitSoundEl  = document.querySelector("#hitSoundEntity");
const missSoundEl = document.querySelector("#missSoundEntity");
const bgMusicAudio = document.querySelector("#bgMusicAudio");

// On first user interaction, unlock AudioContext and resume bgMusic if needed.
// This satisfies browser autoplay policies.
let _audioUnlocked = false;
function unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  // Resume A-Frame's AudioContext if suspended
  const ctx = AFRAME.scenes[0].audioListener && AFRAME.scenes[0].audioListener.context;
  if (ctx && ctx.state === "suspended") ctx.resume();
  // If music should be playing, start it now
  if (settings.musicOn && gameActive) {
    bgMusicAudio.volume = 0.45;
    bgMusicAudio.play().catch(() => {});
  }
}
document.addEventListener("click",     unlockAudio, { once: true });
document.addEventListener("touchstart", unlockAudio, { once: true });

function playHit() {
  if (hitSoundEl.components && hitSoundEl.components.sound) {
    hitSoundEl.components.sound.stopSound();
    hitSoundEl.components.sound.playSound();
  }
}

function playMiss() {
  if (missSoundEl.components && missSoundEl.components.sound) {
    missSoundEl.components.sound.stopSound();
    missSoundEl.components.sound.playSound();
  }
}

function startMusic() {
  if (!settings.musicOn) return;
  bgMusicAudio.volume = 0.45;
  bgMusicAudio.play().catch(() => {
    // Autoplay blocked -- will start on next user gesture via unlockAudio
  });
}

function stopMusic() {
  bgMusicAudio.pause();
  bgMusicAudio.currentTime = 0;
}


//////////////////////////////
// TEXTURE HELPER
//////////////////////////////

function applyTexture(sphere, pattern) {
  const col = patternColor[pattern] || "#ffffff";
  sphere.setAttribute("material", `color: ${col}; roughness: 0.75; metalness: 0.05`);

  function doApply() {
    const mesh = sphere.getObject3D("mesh");
    if (!mesh) return;
    const tex = ballTextures[pattern];
    if (!tex) return;
    mesh.traverse(node => {
      if (node.isMesh && node.material) {
        node.material.map = tex;
        node.material.needsUpdate = true;
      }
    });
  }

  if (sphere.object3D && sphere.getObject3D("mesh")) {
    doApply();
  } else {
    sphere.addEventListener("object3dset", doApply, { once: true });
    setTimeout(doApply, 100);
  }
}

function greyOutSphere(sphere) {
  sphere.setAttribute("material", "color: #333; roughness: 1.0");
  const mesh = sphere.getObject3D("mesh");
  if (mesh) {
    mesh.traverse(node => {
      if (node.isMesh && node.material) {
        node.material.map = null;
        node.material.needsUpdate = true;
      }
    });
  }
}


//////////////////////////////
// INIT GAME
//////////////////////////////

let targetPattern = "";

function initGame() {
  currentRound    = 1;
  currentLevel    = 1;
  activePatterns  = patternsL1;
  roundsCompleted = 0;

  lives  = 3;
  score  = 0;
  gameActive = true;

  timeLeft = GAME_TIME;

  updateLives();
  updateScore();
  updateRound();
  updateTimer();

  // Show timer and round HUD
  roundText.setAttribute("visible", true);
  timerText.setAttribute("visible", true);

  startMusic();
  startTimer();
  pickNewTarget();
  buildGrid();
}


//////////////////////////////
// TARGET COLOR
//////////////////////////////

function pickNewTarget() {
  targetPattern = activePatterns[Math.floor(Math.random() * activePatterns.length)];
  applyTexture(targetBall, targetPattern);
}


//////////////////////////////
// ROUND / LEVEL TRANSITION
//////////////////////////////

function showAnnouncement(text, color, callback) {
  // Pause timer and shooting during announcement
  gameActive = false;
  stopTimer();

  const ann = document.querySelector("#levelAnnouncement");
  ann.setAttribute("value", text);
  ann.setAttribute("color", color);
  ann.setAttribute("visible", true);

  setTimeout(() => {
    ann.setAttribute("visible", false);
    gameActive = true;
    startTimer();
    if (callback) callback();
  }, 2000);
}

function triggerLevel2() {
  // Reset fuse for level 2 within this round
  const baseFuse  = difficultyConfig[settings.difficulty].fuseTimeout;
  const newFuse   = Math.max(400, baseFuse - 400);

  showAnnouncement(
    "ROUND " + currentRound + "  -  WAVE 2",
    "#ff44ff",
    () => {
      currentLevel   = 2;
      activePatterns = patternsL2;
      gazeCursor.setAttribute("fuse-timeout", newFuse);
      pickNewTarget();
      buildGrid();
    }
  );
}

function triggerNextRound() {
  roundsCompleted++;

  if (roundsCompleted >= TOTAL_ROUNDS) {
    // All 5 rounds done -- player wins
    gameActive = false;
    stopMusic();
    showFinalScore("YOU WIN!");
    return;
  }

  currentRound++;

  showAnnouncement(
    "ROUND " + currentRound + "  START!",
    "#ffdd44",
    () => {
      currentLevel   = 1;
      activePatterns = patternsL1;
      // Restore base fuse for this difficulty
      gazeCursor.setAttribute("fuse-timeout", difficultyConfig[settings.difficulty].fuseTimeout);
      updateRound();
      pickNewTarget();
      buildGrid();
    }
  );
}


//////////////////////////////
// CHECK LEVEL / ROUND CLEAR
//////////////////////////////

function checkLevelClear() {
  // Only count direct children of #grid -- not hitbox child spheres
  const remaining = document.querySelectorAll("#grid > a-sphere.grid-ball");

  let matchCount = 0;
  remaining.forEach(b => {
    if (b.dataset.pattern === targetPattern) matchCount++;
  });

  if (matchCount > 0) return; // still balls to shoot

  if (currentLevel === 1) {
    triggerLevel2();
  } else {
    // Level 2 cleared -- round complete
    triggerNextRound();
  }
}


//////////////////////////////
// CREATE GRID
//////////////////////////////

function buildGrid() {
  const cfg     = difficultyConfig[settings.difficulty];
  const rows    = cfg.rows;
  const cols    = cfg.cols;
  const spacing = 0.9;

  const grid = document.querySelector("#grid");
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const sphere  = document.createElement("a-sphere");
      const pattern = activePatterns[Math.floor(Math.random() * activePatterns.length)];

      sphere.setAttribute("class", "grid-ball");
      sphere.setAttribute("radius", "0.25");
      sphere.setAttribute(
        "position",
        `${(c - cols/2 + 0.5) * spacing} ${2.2 + (rows/2 - r - 0.5) * spacing} -3.5`
      );
      sphere.dataset.pattern = pattern;
      applyTexture(sphere, pattern);

      // Invisible hitbox child -- 2x radius so gaze lands anywhere near the ball
      const hitbox = document.createElement("a-sphere");
      hitbox.setAttribute("radius", "0.42");
      hitbox.setAttribute("material", "visible: false; opacity: 0; transparent: true");
      hitbox.setAttribute("class", "grid-ball");
      hitbox.dataset.pattern = pattern;
      sphere.appendChild(hitbox);
      // Sync hitbox pattern when parent pattern changes
      sphere._hitbox = hitbox;

      addGazeShootLogic(sphere);
      grid.appendChild(sphere);
    }
  }

  // Guarantee at least 3 target-color balls
  const allBalls   = Array.from(document.querySelectorAll("#grid > a-sphere.grid-ball"));
  const matches    = allBalls.filter(b => b.dataset.pattern === targetPattern);
  const needed     = 3 - matches.length;

  if (needed > 0) {
    const nonMatches = allBalls.filter(b => b.dataset.pattern !== targetPattern);
    for (let i = 0; i < needed && i < nonMatches.length; i++) {
      const idx = i + Math.floor(Math.random() * (nonMatches.length - i));
      const tmp = nonMatches[i]; nonMatches[i] = nonMatches[idx]; nonMatches[idx] = tmp;
      nonMatches[i].dataset.pattern = targetPattern;
      if (nonMatches[i]._hitbox) nonMatches[i]._hitbox.dataset.pattern = targetPattern;
      applyTexture(nonMatches[i], targetPattern);
    }
  }

  gazeCursor.components.raycaster.refreshObjects();
}


//////////////////////////////
// GAZE SHOOT
//////////////////////////////

function addGazeShootLogic(ball) {
  // Helper: get root ball (in case event fires on hitbox child)
  function getRoot(el) {
    // If el has a parentElement that is also .grid-ball, el is the hitbox child
    return (el.parentElement && el.parentElement.classList.contains("grid-ball"))
      ? el.parentElement
      : el;
  }

  ball.addEventListener("mouseenter", () => {
    if (!gameActive) return;
    const root = getRoot(ball);
    root.setAttribute("scale", "1.2 1.2 1.2");
  });
  ball.addEventListener("mouseleave", () => {
    const root = getRoot(ball);
    root.setAttribute("scale", "1 1 1");
  });
  ball.addEventListener("click", () => {
    if (!gameActive) return;
    unlockAudio(); // ensure audio unlocked on first interaction
    const root = getRoot(ball);
    shootBall(root);
  });
}


//////////////////////////////
// SHOOTING
//////////////////////////////

function shootBall(target) {
  createProjectile(target);
}


//////////////////////////////
// PROJECTILE + COLLISION
//////////////////////////////

function createProjectile(target) {
  if (!target.parentNode) return;

  const projectile = document.createElement("a-sphere");
  projectile.setAttribute("radius", "0.08");
  projectile.setAttribute("material", "color: #ffffff; emissive: #88ddff; emissiveIntensity: 0.8; roughness: 0.2; metalness: 0.4");

  // Spawn at camera world position so projectile always starts from POV
  const cam = document.querySelector("#cameraRig");
  const camPos = new THREE.Vector3();
  cam.object3D.getWorldPosition(camPos);
  projectile.setAttribute("position", `${camPos.x} ${camPos.y} ${camPos.z}`);
  document.querySelector("a-scene").appendChild(projectile);

  // Apply a bright energy texture to the projectile
  projectile.addEventListener("object3dset", () => {
    const mesh = projectile.getObject3D("mesh");
    if (!mesh) return;
    const tex = ballTextures["blue"] || null;
    if (!tex) return;
    mesh.traverse(node => {
      if (node.isMesh && node.material) {
        node.material.map = tex;
        node.material.emissive = new THREE.Color(0x44aaff);
        node.material.emissiveIntensity = 0.6;
        node.material.needsUpdate = true;
      }
    });
  }, { once: true });

  const targetPos = target.object3D.getWorldPosition(new THREE.Vector3());
  projectile.setAttribute("animation", {
    property: "position",
    to: `${targetPos.x} ${targetPos.y} ${targetPos.z}`,
    dur: projectileDur,
    easing: "linear"
  });

  let resolved = false;

  function resolveHit() {
    if (resolved) return;
    resolved = true;
    clearInterval(collisionInterval);
    projectile.removeAttribute("animation");

    if (!target.parentNode) {
      if (projectile.parentNode) projectile.parentNode.removeChild(projectile);
      return;
    }

    if (target.dataset.pattern === targetPattern) {
      score = Math.max(0, score + 10);
      updateScore();
      playHit();
      target.parentNode.removeChild(target);
      checkLevelClear();
    } else {
      score = Math.max(0, score - 5);
      updateScore();
      playMiss();
      lives--;
      updateLives();
      greyOutSphere(target);
      if (lives <= 0) endGame();
    }

    if (projectile.parentNode) projectile.parentNode.removeChild(projectile);
  }

  const projVec   = new THREE.Vector3();
  const targetVec = new THREE.Vector3();

  const collisionInterval = setInterval(() => {
    if (!projectile.parentNode || !target.parentNode) {
      clearInterval(collisionInterval);
      if (projectile.parentNode) projectile.parentNode.removeChild(projectile);
      return;
    }
    projectile.object3D.getWorldPosition(projVec);
    target.object3D.getWorldPosition(targetVec);
    if (projVec.distanceTo(targetVec) < 0.35) resolveHit();
  }, 50);

  setTimeout(() => { if (!resolved) resolveHit(); }, projectileDur + 100);
}

</script>
